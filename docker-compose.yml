services:
  studio:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        APP: studio
        NEXT_PUBLIC_CRADLE_RUNTIME_URL: ${CRADLE_STUDIO_RUNTIME_URL:-http://localhost:3002}
    ports: ["3000:3000"]
  runtime:
    build: { context: ., dockerfile: deploy/Dockerfile, args: { APP: runtime } }
    env_file:
      - path: ./.env
        required: false
    environment:
      PORT: 3002
      DATABASE_URL: postgres://cradle:cradle@postgres:5432/cradle
      CRADLE_ASSET_DIRECTORY: /app/data/assets
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports: ["3002:3002"]
    volumes: ["cradle-assets:/app/data/assets"]
  worker:
    build: { context: ., dockerfile: deploy/Dockerfile, args: { APP: worker } }
    env_file:
      - path: ./.env
        required: false
    environment:
      DATABASE_URL: postgres://cradle:cradle@postgres:5432/cradle
      CRADLE_ASSET_DIRECTORY: /app/data/assets
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes: ["cradle-assets:/app/data/assets"]
  migrate:
    build: { context: ., dockerfile: deploy/Dockerfile, args: { APP: runtime } }
    command: pnpm --filter @cradle/db db:migrate
    environment:
      DATABASE_URL: postgres://cradle:cradle@postgres:5432/cradle
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: pgvector/pgvector:pg16
    environment: { POSTGRES_USER: cradle, POSTGRES_PASSWORD: cradle, POSTGRES_DB: cradle }
    volumes: ["cradle-postgres:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cradle -d cradle"]
      interval: 5s
      timeout: 5s
      retries: 12
volumes:
  cradle-postgres:
  cradle-assets:
