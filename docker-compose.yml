services:
  studio:
    build: { context: ., dockerfile: deploy/Dockerfile, args: { APP: studio } }
    environment: { NEXT_PUBLIC_CRADLE_RUNTIME_URL: http://localhost:3002 }
    ports: ["3000:3000"]
  runtime:
    build: { context: ., dockerfile: deploy/Dockerfile, args: { APP: runtime } }
    environment:
      PORT: 3002
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      DATABASE_URL: postgres://cradle:cradle@postgres:5432/cradle
      CRADLE_MODEL_ID: ${CRADLE_MODEL_ID:-gpt-5.6-sol}
      CRADLE_STUDIO_ORIGIN: ${CRADLE_STUDIO_ORIGIN:-http://localhost:3000}
      CRADLE_DEVELOPMENT_EMBED_ORIGIN: ${CRADLE_DEVELOPMENT_EMBED_ORIGIN:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports: ["3002:3002"]
  migrate:
    build: { context: ., dockerfile: deploy/Dockerfile, args: { APP: runtime } }
    command: pnpm --filter @cradle/db db:migrate
    environment:
      DATABASE_URL: postgres://cradle:cradle@postgres:5432/cradle
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: pgvector/pgvector:pg16
    environment: { POSTGRES_USER: cradle, POSTGRES_PASSWORD: cradle, POSTGRES_DB: cradle }
    volumes: ["cradle-postgres:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cradle -d cradle"]
      interval: 5s
      timeout: 5s
      retries: 12
volumes:
  cradle-postgres:
