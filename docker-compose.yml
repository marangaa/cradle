services:
  studio:
    build: { context: ., dockerfile: deploy/Dockerfile, args: { APP: studio } }
    environment: { NEXT_PUBLIC_CRADLE_RUNTIME_URL: http://localhost:3002 }
    ports: ["3000:3000"]
  runtime:
    build: { context: ., dockerfile: deploy/Dockerfile, args: { APP: runtime } }
    environment:
      PORT: 3002
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      CRADLE_MODEL_ID: ${CRADLE_MODEL_ID:-gpt-5.6-sol}
    ports: ["3002:3002"]
  postgres:
    image: pgvector/pgvector:pg16
    environment: { POSTGRES_USER: cradle, POSTGRES_PASSWORD: cradle, POSTGRES_DB: cradle }
    volumes: ["cradle-postgres:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment: { MINIO_ROOT_USER: cradle, MINIO_ROOT_PASSWORD: cradle-storage-change-me }
    ports: ["9001:9001"]
volumes:
  cradle-postgres:
